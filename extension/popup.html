<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>Attention Tracker</title>
  </head>
  <body>
    <main>
      <h1>Attention Tracker</h1>
      <p id="state">Checking status...</p>
      <button id="toggle" type="button">Pause</button>
      <div class="quick-pauses" aria-label="Quick pause options">
        <button data-minutes="15" type="button">15 min</button>
        <button data-minutes="60" type="button">1 hour</button>
      </div>
      <a href="http://localhost:3847" target="_blank" rel="noreferrer">Open dashboard</a>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
